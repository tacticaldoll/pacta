name: ci

on:
  push:
  pull_request:

jobs:
  dod:
    name: Definition of Done
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build / test / clippy / fmt / doc
        run: |
          cargo build --workspace --all-features
          cargo build --workspace --no-default-features
          cargo test --workspace --all-features
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo clippy --workspace --no-default-features -- -D warnings
          cargo fmt --all --check
          RUSTDOCFLAGS="-D warnings" cargo doc --workspace --no-deps --all-features

  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install and select the declared MSRV toolchain
        uses: dtolnay/rust-toolchain@1.88
      - name: workspace builds on the declared MSRV
        run: cargo +1.88 build --workspace --all-features

  supply-chain:
    name: Supply chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: license / advisory / bans / sources policy
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  governance:
    name: Tianheng reaction
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: architecture constitution passes
        run: cargo run -p pacta-governance -- check --manifest-path Cargo.toml
